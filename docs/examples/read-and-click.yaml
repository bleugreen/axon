version: 1
args:
  - name: issue_title
    type: string
    description: Issue title to enter before saving
    default: Draft issue title
actions:
  - tool: type
    target:
      app: cairn
      locator:
        role: AXTextField
        label:
          contains: Title
    value: "{{issue_title}}"
  - tool: click
    target:
      app: cairn
      locator:
        role: AXButton
        label: Save
        actions:
          - AXPress
