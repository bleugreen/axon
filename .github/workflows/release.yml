name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading v
        required: true
        default: 0.1.6
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-15

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      PUBLIC_RELEASE_PAT: ${{ secrets.PUBLIC_RELEASE_PAT }}

    steps:
      - name: Check out Axon
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Resolve release version
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
            TAG="v$VERSION"
          else
            TAG="$GITHUB_REF_NAME"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create manual release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the release version instead of overwriting an existing release."
            exit 1
          fi
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

      - name: Check release secrets
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE:?APPLE_CERTIFICATE is required}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD is required}"
          : "${APPLE_API_KEY:?APPLE_API_KEY is required}"
          : "${APPLE_API_KEY_ID:?APPLE_API_KEY_ID is required}"
          : "${APPLE_API_ISSUER:?APPLE_API_ISSUER is required}"

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/axon-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/axon-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "AXON_NOTARY_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and staple
        env:
          AXON_VERSION: ${{ steps.release.outputs.version }}
          AXON_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          AXON_NOTARY_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          ./scripts/package-app
          codesign --verify --deep --strict "dist/Axon.app"
          codesign --verify --deep --strict "dist/Axon Editor.app"
          spctl -a -vvv -t install "dist/Axon.app"
          spctl -a -vvv -t install "dist/Axon Editor.app"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Axon-${{ steps.release.outputs.version }}
          path: dist/Axon-${{ steps.release.outputs.version }}.zip
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          ZIP_PATH="dist/Axon-$VERSION.zip"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP_PATH" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "$ZIP_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Axon $VERSION" \
              --generate-notes
          fi

      - name: Publish Homebrew cask
        if: env.PUBLIC_RELEASE_PAT != ''
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          SHA256="$(shasum -a 256 "dist/Axon-$VERSION.zip" | awk '{ print $1 }')"
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"

          git clone "https://x-access-token:${PUBLIC_RELEASE_PAT}@github.com/bleugreen/homebrew-tap.git" "$TAP_DIR"
          cd "$TAP_DIR"
          git checkout -B main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p Casks
          cat > Casks/axon.rb <<CASK
          cask "axon" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/bleugreen/axon/releases/download/v#{version}/Axon-#{version}.zip"
            name "Axon"
            desc "Local macOS accessibility service for agents"
            homepage "https://github.com/bleugreen/axon"

            depends_on macos: ">= :sonoma"

            app "Axon-#{version}/Axon.app"
            app "Axon-#{version}/Axon Editor.app"
            binary "#{appdir}/Axon.app/Contents/Resources/bin/axon"

            zap trash: [
              "~/Library/Application Support/Axon",
              "~/Library/Logs/Axon",
            ]
          end
          CASK

          if [[ ! -f README.md ]]; then
            cat > README.md <<README
          # bleugreen/homebrew-tap

          ```sh
          brew install --cask bleugreen/tap/axon
          ```
          README
          fi

          git add Casks/axon.rb README.md
          git commit -m "Update axon cask to $VERSION" || exit 0
          git push origin main
